version: '3.8'

services:
  db:
    image: postgres:15
    container_name: govtschemes-db
    environment:
      POSTGRES_USER: govtuser
      POSTGRES_PASSWORD: govtpass
      POSTGRES_DB: govtschemes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govtuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: govtschemes-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: govtschemes-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://govtuser:govtpass@db:5432/govtschemes
      REDIS_URL: redis://redis:6379
      MSG91_API_KEY: ${MSG91_API_KEY}
      FAST2SMS_API_KEY: ${FAST2SMS_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      DATA_GOV_API_KEY: ${DATA_GOV_API_KEY}
      BHASHINI_API_KEY: ${BHASHINI_API_KEY}
      INDICTRANS_URL: http://indictrans:8001/translate
      BACKEND_URL: http://localhost:8000
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: govtschemes-frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ../frontend:/app

volumes:
  postgres_data:
  redis_data:
